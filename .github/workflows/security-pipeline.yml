name: Secure CI/CD Pipeline

on:
  push:
    branches: [ master ]

jobs:
  sast:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Run SAST Scan (Semgrep)
      uses: returntocorp/semgrep-action@v1

  dast:
    runs-on: ubuntu-latest
    needs: sast

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Run OWASP ZAP Scan
      uses: zaproxy/action-baseline@v0.7.0
