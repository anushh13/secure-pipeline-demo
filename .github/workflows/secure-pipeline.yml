name: Secure CI/CD Pipeline with SAST and DAST

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  APP_NAME: secure-app
  STAGING_URL: http://localhost:3000

jobs:
  build-and-test:
    name: Build and Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run unit tests with coverage
        run: npm test -- --coverage --coverageReporters=lcov || true

      - name: Build application
        run: echo "Build step completed"

  sast-sonarqube:
    name: SAST - SonarQube Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  sca-dependency-check:
    name: SCA - Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        run: npm audit --audit-level=high || true

  deploy-staging:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    needs: [sast-sonarqube, sca-dependency-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Start application
        run: |
          npm start &
          sleep 20

      - name: Check application health
        run: curl -f http://localhost:3000 || exit 1

  dast-owasp-zap:
    name: DAST - OWASP ZAP Security Scan
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:3000'
          fail_action: false

  security-gate:
    name: Security Review Gate
    runs-on: ubuntu-latest
    needs: [sast-sonarqube, sca-dependency-check, dast-owasp-zap]

    steps:
      - name: Security Gate Check
        run: |
          echo "All security scans completed"
          echo "If critical vulnerabilities are found, deployment should be blocked"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: security-gate
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Production Deployment
        run: echo "Production deployment would happen here"